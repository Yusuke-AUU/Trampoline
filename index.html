<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRAMPOLINE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="hud-left">
    <div class="lbl">SKILL</div>
    <div id="skill-no" class="val">1<span class="unit">/10</span></div>
  </div>
  <div id="hud-center">
    <div id="dots"></div>
    <div id="phase-txt">—</div>
  </div>
  <div id="hud-right">
    <div class="lbl">SCORE</div>
    <div id="score-val" class="val">0.0</div>
  </div>
</div>

<div id="cmd-wrap">
  <div id="cmd-dir"></div>
  <div id="cmd-seq"></div>
  <div id="cmd-hint"></div>
</div>

<div id="msg"></div>

<div id="tap-ring"></div>

<!-- フラッシュラベル用 -->

<!-- タイトル -->
<div id="title">
  <div id="t-logo">TRAMPOLINE</div>
  <div id="t-sub">競技トランポリン</div>
  <div id="t-rules">
    <div class="r-row"><b>姿勢</b> 〇＝抱え込み　＜＝屈伸　／＝伸身</div>
    <div class="r-row"><b>宙返り</b> タップ回数（最大3回）</div>
    <div class="r-row"><b>捻り</b> タップ直後に 〇＝1回 ／＝0.5回</div>
    <div class="r-sep"></div>
    <div class="r-row ex">例: ＜・〇・・／ = 屈伸3宙2.5捻（前方）</div>
    <div class="r-row ex">例: 〇・・〇・〇 = 抱え込み3宙2捻（後方）</div>
  </div>
  <button id="start-btn">START</button>
</div>

<!-- リザルト -->
<div id="result" class="hidden">
  <div id="r-title">RESULT</div>
  <div id="r-rows"></div>
  <div id="r-sep"></div>
  <div id="r-total-row">
    <span>TOTAL</span><span id="r-total">0.00</span>
  </div>
  <button id="retry-btn">もう一度</button>
</div>

<script src="game.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TRAMPOLINE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="hud-left">
    <div class="lbl">SKILL</div>
    <div id="skill-no" class="val">1<span class="unit">/10</span></div>
  </div>
  <div id="hud-center">
    <div id="dots"></div>
    <div id="phase-txt">—</div>
  </div>
  <div id="hud-right">
    <div class="lbl">SCORE</div>
    <div id="score-val" class="val">0.0</div>
  </div>
</div>

<div id="cmd-wrap">
  <div id="cmd-dir"></div>
  <div id="cmd-seq">—</div>
  <div id="cmd-hint">円スワイプ=抱え込み　V字=屈伸　斜め=伸身</div>
</div>

<div id="msg"></div>
<div id="tap-ring"></div>

<div id="title">
  <div id="t-logo">TRAMPOLINE</div>
  <div id="t-sub">競技トランポリン</div>
  <div id="t-rules">
    <div class="r-head">コマンド入力</div>
    <div class="r-row"><span class="r-ico">○</span>円スワイプ → 抱え込み姿勢 / 捻り×1</div>
    <div class="r-row"><span class="r-ico">＜</span>V字スワイプ → 屈伸姿勢</div>
    <div class="r-row"><span class="r-ico">／</span>斜めスワイプ → 伸身姿勢 / 捻り×0.5</div>
    <div class="r-row"><span class="r-ico">・</span>タップ → 宙返り1回</div>
    <div class="r-sep"></div>
    <div class="r-ex">例: ＜ · 〇 · · ／ = 屈伸3宙2.5捻（前方）</div>
  </div>
  <button id="start-btn">START</button>
</div>

<div id="result" class="hidden">
  <div id="r-title">RESULT</div>
  <div id="r-rows"></div>
  <div class="r-divider"></div>
  <div id="r-total-row"><span>TOTAL</span><span id="r-total">0.00</span></div>
  <button id="retry-btn">もう一度</button>
</div>

<script src="game.js"></script>
</body>
</html>
